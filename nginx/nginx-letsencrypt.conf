# AppFlowy Cloud — nginx config for Let's Encrypt automated TLS
# Use this file instead of nginx.conf when using the AppFlowy-Certbot companion container.
#
# Pre-flight checklist:
#  1. Deploy AppFlowy-Certbot first to obtain the initial certificate.
#  2. Point the AppFlowy-Nginx "nginx.conf" path config to this file.
#  3. Replace YOUR_DOMAIN below with your actual domain name (two places).
#  4. Update all http:// URLs in every other template to https://
#     and change APPFLOWY_WS_BASE_URL from ws:// to wss://.
#  5. Restart AppFlowy-Nginx after the initial cert is issued and after each renewal.
#
# Certificate paths written by certbot:
#   /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem
#   /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem
# (mapped from /mnt/user/appdata/AppFlowy-Nginx/letsencrypt/ on the host)

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $http_origin $cors_origin {
        default $http_origin;
    }

    # HTTP: serve ACME challenge only; redirect everything else to HTTPS
    server {
        listen 80;

        # Let's Encrypt HTTP-01 webroot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Prometheus stub-status endpoint (optional)
    server {
        listen 8080;
        location = /stub_status {
            stub_status;
        }
    }

    server {
        listen 443 ssl;

        # Replace YOUR_DOMAIN with your actual domain name
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 10M;
        underscores_in_headers on;

        set $appflowy_cloud_backend   "http://AppFlowy-Cloud:8000";
        set $gotrue_backend           "http://AppFlowy-GoTrue:9999";
        set $admin_frontend_backend   "http://AppFlowy-Admin:3000";
        set $appflowy_web_backend     "http://AppFlowy-Web:80";
        set $minio_backend            "http://AppFlowy-MinIO:9001";
        set $minio_api_backend        "http://AppFlowy-MinIO:9000";
        set $minio_internal_host      "AppFlowy-MinIO:9000";

        location /gotrue/ {
            proxy_pass $gotrue_backend;
            rewrite ^/gotrue(/.*)$ $1 break;
            proxy_set_header Host $http_host;
            proxy_pass_request_headers on;
        }

        location /ws {
            proxy_pass $appflowy_cloud_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        location /api {
            proxy_pass $appflowy_cloud_backend;
            proxy_set_header X-Request-Id $request_id;
            proxy_set_header Host         $http_host;

            location ~* ^/api/workspace/([a-zA-Z0-9_-]+)/publish$ {
                proxy_pass $appflowy_cloud_backend;
                proxy_request_buffering off;
                client_max_body_size 256M;
            }

            location /api/chat {
                proxy_pass $appflowy_cloud_backend;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                chunked_transfer_encoding on;
                proxy_buffering off;
                proxy_cache   off;
                proxy_read_timeout    600s;
                proxy_connect_timeout 600s;
                proxy_send_timeout    600s;
            }

            location /api/import {
                proxy_pass $appflowy_cloud_backend;
                proxy_set_header X-Request-Id $request_id;
                proxy_set_header Host         $http_host;
                proxy_read_timeout    600s;
                proxy_connect_timeout 600s;
                proxy_send_timeout    600s;
                proxy_request_buffering off;
                proxy_buffering off;
                proxy_cache   off;
                client_max_body_size 2G;
            }
        }

        location /minio/ {
            proxy_pass $minio_backend;
            rewrite ^/minio/(.*) /$1 break;
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-NginX-Proxy     true;
            real_ip_header X-Real-IP;
            proxy_connect_timeout 300s;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            chunked_transfer_encoding off;
        }

        location /minio-api/ {
            proxy_pass $minio_api_backend;
            proxy_set_header Host              $minio_internal_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            rewrite ^/minio-api/(.*) /$1 break;
            proxy_connect_timeout 300s;
            proxy_read_timeout    600s;
            proxy_send_timeout    600s;
            proxy_request_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;
            client_max_body_size 0;
        }

        location /ai/ {
            proxy_pass $appflowy_cloud_backend;
            proxy_set_header X-Request-Id      $request_id;
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /console {
            proxy_pass $admin_frontend_backend;
            proxy_set_header X-Forwarded-Host  $http_host;
            proxy_set_header Host              $http_host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Scheme          $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache_bypass $http_upgrade;
        }

        location / {
            proxy_pass $appflowy_web_backend;
            proxy_set_header X-Scheme $scheme;
            proxy_set_header Host     $host;
        }
    }
}
