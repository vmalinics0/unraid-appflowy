# AppFlowy Cloud — nginx reverse proxy configuration
# Adapted for Unraid Community Apps (container names use AppFlowy- prefix)
# Place this file at: /mnt/user/appdata/AppFlowy-Nginx/nginx.conf
# For TLS: add certificate.crt and private_key.key under
#   /mnt/user/appdata/AppFlowy-Nginx/ssl/

events {
    worker_connections 1024;
}

http {
    # Unraid / Docker embedded DNS resolver
    resolver 127.0.0.11 valid=10s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $http_origin $cors_origin {
        default $http_origin;
    }

    # Prometheus stub-status endpoint (optional)
    server {
        listen 8080;
        location = /stub_status {
            stub_status;
        }
    }

    server {
        # Uncomment the ssl lines and comment the plain listen 80 line
        # once you have placed certificates in the ssl/ directory.
        # ssl_certificate     /etc/nginx/ssl/certificate.crt;
        # ssl_certificate_key /etc/nginx/ssl/private_key.key;

        listen 80;
        # listen 443 ssl;

        client_max_body_size 10M;
        underscores_in_headers on;

        # --- backend aliases (Unraid container names on the "appflowy" network) ---
        set $appflowy_cloud_backend   "http://AppFlowy-Cloud:8000";
        set $gotrue_backend           "http://AppFlowy-GoTrue:9999";
        set $admin_frontend_backend   "http://AppFlowy-Admin:3000";
        set $appflowy_web_backend     "http://AppFlowy-Web:80";
        set $minio_backend            "http://AppFlowy-MinIO:9001";
        set $minio_api_backend        "http://AppFlowy-MinIO:9000";
        set $minio_internal_host      "AppFlowy-MinIO:9000";

        # GoTrue auth
        location /gotrue/ {
            proxy_pass $gotrue_backend;
            rewrite ^/gotrue(/.*)$ $1 break;
            proxy_set_header Host $http_host;
            proxy_pass_request_headers on;
        }

        # WebSocket (real-time collaboration)
        location /ws {
            proxy_pass $appflowy_cloud_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # REST API
        location /api {
            proxy_pass $appflowy_cloud_backend;
            proxy_set_header X-Request-Id $request_id;
            proxy_set_header Host         $http_host;

            location ~* ^/api/workspace/([a-zA-Z0-9_-]+)/publish$ {
                proxy_pass $appflowy_cloud_backend;
                proxy_request_buffering off;
                client_max_body_size 256M;
            }

            location /api/chat {
                proxy_pass $appflowy_cloud_backend;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                chunked_transfer_encoding on;
                proxy_buffering off;
                proxy_cache   off;
                proxy_read_timeout    600s;
                proxy_connect_timeout 600s;
                proxy_send_timeout    600s;
            }

            location /api/import {
                proxy_pass $appflowy_cloud_backend;
                proxy_set_header X-Request-Id $request_id;
                proxy_set_header Host         $http_host;
                proxy_read_timeout    600s;
                proxy_connect_timeout 600s;
                proxy_send_timeout    600s;
                proxy_request_buffering off;
                proxy_buffering off;
                proxy_cache   off;
                client_max_body_size 2G;
            }
        }

        # MinIO Web UI (admin console)
        location /minio/ {
            proxy_pass $minio_backend;
            rewrite ^/minio/(.*) /$1 break;
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-NginX-Proxy     true;
            real_ip_header X-Real-IP;
            proxy_connect_timeout 300s;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            chunked_transfer_encoding off;
        }

        # MinIO API (presigned URLs for file access)
        location /minio-api/ {
            proxy_pass $minio_api_backend;
            proxy_set_header Host              $minio_internal_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            rewrite ^/minio-api/(.*) /$1 break;
            proxy_connect_timeout 300s;
            proxy_read_timeout    600s;
            proxy_send_timeout    600s;
            proxy_request_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;
            client_max_body_size 0;
        }

        # AI endpoints
        location /ai/ {
            proxy_pass $appflowy_cloud_backend;
            proxy_set_header X-Request-Id      $request_id;
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin console
        location /console {
            proxy_pass $admin_frontend_backend;
            proxy_set_header X-Forwarded-Host  $http_host;
            proxy_set_header Host              $http_host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Scheme          $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache_bypass $http_upgrade;
        }

        # AppFlowy Web (catch-all)
        location / {
            proxy_pass $appflowy_web_backend;
            proxy_set_header X-Scheme $scheme;
            proxy_set_header Host     $host;
        }
    }
}
